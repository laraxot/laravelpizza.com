name: Meetup Theme Quality Checks

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'laravel/Themes/Meetup/**'
  pull_request:
    branches:
      - develop
      - main
    paths:
      - 'laravel/Themes/Meetup/**'

jobs:
  quality:
    runs-on: ubuntu-latest
    environment: Testing
    
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Add Flux Credentials
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"
        working-directory: laravel

      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
        working-directory: laravel

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse Themes/Meetup --level=10 --memory-limit=-1
        working-directory: laravel

      - name: Run PHPMD
        run: |
          if [ -f phpmd.phar ]; then
            php phpmd.phar Themes/Meetup text cleancode,codesize,design,naming,unusedcode
          else
            ./vendor/bin/phpmd Themes/Meetup text cleancode,codesize,design,naming,unusedcode
          fi
        working-directory: laravel

      - name: Run Pint
        run: ./vendor/bin/pint Themes/Meetup
        working-directory: laravel

      - name: Run PHPInsights
        run: |
          if [ -f vendor/bin/phpinsights ]; then
            ./vendor/bin/phpinsights analyse Themes/Meetup --format=table --no-interaction --min-quality=70
          fi
        working-directory: laravel
