name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        working-directory: laravel/Themes/Meetup
        run: npm ci

      - name: Build Assets
        working-directory: laravel/Themes/Meetup
        run: npm run build && npm run copy

      - name: Upload Assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: laravel/Themes/Meetup/public_html/themes/Meetup/dist
          asset_content_type: application/zip
