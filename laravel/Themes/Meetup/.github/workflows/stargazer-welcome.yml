name: Stargazer Welcome

on:
  star:
    types: [created]

jobs:
  stargazer_welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            🎉 Welcome to LaravelPizza Meetup Theme! Thank you for starring our repository.
            We're thrilled to have you as part of our growing community.

            Here are some quick links to get you started:
            - **Documentation**: [Meetup Theme Docs](Themes/Meetup/docs/)
            - **LaravelPizza**: https://laravelpizza.com
            - **Report an Issue**: https://github.com/laraxot/laravelpizza/issues

            Feel free to explore, contribute, or reach out if you have any questions!
          pr-message: |
            👋 Hello there, and thanks for your first Pull Request!
            We really appreciate you taking the time to contribute to our project.

            Our team will review your PR shortly. In the meantime, please ensure you've followed our Contributing Guidelines.

            Thanks again for making our project better!
