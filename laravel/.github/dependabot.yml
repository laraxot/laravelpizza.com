version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "composer"
    directory: "/laravel"
    schedule:
      interval: "weekly"
    groups:
      laravel-dependencies:
        patterns:
          - "laravel/*"
          - "filament/*"
          - "livewire/*"
    ignore:
      - dependency-name: "php"

  - package-ecosystem: "npm"
    directory: "/laravel"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/laravel/Themes/Meetup"
    schedule:
      interval: "weekly"
