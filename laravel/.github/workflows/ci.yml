name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  phpstan:
    name: PHPStan Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, mysql
      
      - name: Install dependencies
        run: |
          cd laravel
          composer install --no-interaction --prefer-dist
      
      - name: Run PHPStan
        run: |
          cd laravel
          ./vendor/bin/phpstan analyse --memory-limit=1G

  pint:
    name: Pint Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      
      - name: Install Pint
        run: |
          cd laravel
          composer require --dev laravel/pint --no-interaction
      
      - name: Run Pint
        run: |
          cd laravel
          ./vendor/bin/pint --test

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, mysql
      
      - name: Copy .env
        run: |
          cp laravel/.env.example laravel/.env
      
      - name: Install dependencies
        run: |
          cd laravel
          composer install --no-interaction --prefer-dist
      
      - name: Generate key
        run: |
          cd laravel
          php artisan key:generate
      
      - name: Run tests
        run: |
          cd laravel
          php artisan test --parallel
