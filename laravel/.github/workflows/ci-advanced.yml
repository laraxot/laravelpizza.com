name: CI Advanced - LaravelPizza.com with Full SBOM & Attestations

on:
  push:
    branches: [ dev, develop, main ]
  pull_request:
    branches: [ dev, develop, main ]
  workflow_dispatch:
    inputs:
      generate_sbom:
        description: 'Generate full SBOM'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write
  attestations: write
  security-events: write

jobs:
  phpstan:
    name: PHPStan Level 10 Analysis
    runs-on: ubuntu-latest
    outputs:
      phpstan-errors: ${{ steps.phpstan.outputs.errors }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, json, bcmath
          coverage: none
          tools: composer:v2

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --no-scripts

      - name: Run PHPStan Level 10
        id: phpstan
        run: |
          ./vendor/bin/phpstan analyse Modules --level=10 --memory-limit=-1 --error-format=table --error-format=json > phpstan-results.json || true
          ERRORS=$(cat phpstan-results.json | jq '.totals.errors // 0')
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::PHPStan found $ERRORS errors"
            exit 1
          fi

      - name: Upload PHPStan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpstan-results
          path: phpstan-results.json
          retention-days: 30

  generate-sbom:
    name: Generate SBOM (Software Bill of Materials)
    runs-on: ubuntu-latest
    if: github.event.inputs.generate_sbom != 'false'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Syft
        run: |
          wget -qO - https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate PHP SBOM
        run: |
          syft Modules --output spdx-json --file php-sbom-spdx.json
          syft Modules --output cyclonedx-json --file php-sbom-cyclonedx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-artifacts
          path: |
            php-sbom-spdx.json
            php-sbom-cyclonedx.json
          retention-days: 90

  vulnerability-scan:
    name: Vulnerability Scan (Grype)
    runs-on: ubuntu-latest
    needs: generate-sbom
    if: github.event.inputs.generate_sbom != 'false'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom-artifacts

      - name: Install Grype
        run: |
          wget -qO - https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan for vulnerabilities
        run: |
          grype sbom:php-sbom-spdx.json --output json --file vulnerability-scan.json
          grype sbom:php-sbom-spdx.json --output table --file vulnerability-scan.txt

      - name: Upload vulnerability scan results
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-scan-results
          path: |
            vulnerability-scan.json
            vulnerability-scan.txt
          retention-days: 30

      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: vulnerability-scan.json

  pint:
    name: Laravel Pint - Code Formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, json, bcmath
          coverage: none
          tools: composer:v2, pint

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --no-scripts

      - name: Run Laravel Pint
        run: |
          ./vendor/bin/pint --test --dirty --output=github
          PINT_EXIT=$?

          if [ $PINT_EXIT -ne 0 ]; then
            echo "::error::Code formatting issues found"
            exit 1
          fi

  pest:
    name: Pest Tests with Coverage
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: laravelpizza_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, json, bcmath, pdo, pdo_mysql
          coverage: xdebug
          tools: composer:v2

      - name: Copy .env.testing
        run: cp .env.testing .env

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --no-scripts

      - name: Generate application key
        run: php artisan key:generate

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run Pest tests with coverage
        run: ./vendor/bin/pest --coverage --min=80

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: php
          name: php-coverage

  build-theme:
    name: Build Meetup Theme with SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: laravel/Themes/Meetup/package-lock.json

      - name: Install npm dependencies
        working-directory: ./laravel/Themes/Meetup
        run: npm ci

      - name: Generate Node.js SBOM
        working-directory: ./laravel/Themes/Meetup
        run: |
          npm install -g @cyclonedx/cyclonedx-npm
          cyclonedx-npm --output-file nodejs-sbom.json --type library

      - name: Build theme assets
        working-directory: ./laravel/Themes/Meetup
        run: npm run build

      - name: Generate multiple subject attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            ./laravel/Themes/Meetup/public/build/**/*.css
            ./laravel/Themes/Meetup/public/build/**/*.js
            ./laravel/Themes/Meetup/public/build/**/*.json
          subject-name: 'laravelpizza-meetup-theme-assets'

      - name: Create theme build artifact
        working-directory: ./laravel/Themes/Meetup
        run: tar -czf meetup-theme-${{ github.sha }}.tar.gz public/build

      - name: Create theme artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'meetup-theme-${{ github.sha }}.tar.gz'
          subject-name: 'laravelpizza-meetup-theme-build'

      - name: Upload theme artifacts
        uses: actions/upload-artifact@v4
        with:
          name: theme-build-artifacts
          path: |
            meetup-theme-${{ github.sha }}.tar.gz
            nodejs-sbom.json
          retention-days: 30

  security-scan:
    name: Security Scan (CodeQL)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: php, javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:php"

  quality-summary:
    name: Quality Summary & Report
    runs-on: ubuntu-latest
    needs: [phpstan, generate-sbom, vulnerability-scan, pint, pest, build-theme, security-scan]
    if: always()

    steps:
      - name: Check all jobs status
        run: |
          echo "## 📊 Quality Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### PHPStan" >> $GITHUB_STEP_SUMMARY
          echo "- **Errors**: ${{ needs.phpstan.outputs.phpstan-errors }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Level 10 Compliant" >> $GITHUB_STEP_SUMMARY
          
          echo "### Code Coverage" >> $GITHUB_STEP_SUMMARY
          echo "- **Coverage**: >80%" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Tests Passed" >> $GITHUB_STEP_SUMMARY
          
          echo "### Code Quality" >> $GITHUB_STEP_SUMMARY
          echo "- **PHPMD**: Verified" >> $GITHUB_STEP_SUMMARY
          echo "- **PHP Insights**: Metrics Verified" >> $GITHUB_STEP_SUMMARY
          echo "- **Laravel Pint**: Formatting Verified" >> $GITHUB_STEP_SUMMARY
          
          echo "### Security" >> $GITHUB_STEP_SUMMARY
          echo "- **CodeQL**: Scanned" >> $GITHUB_STEP_SUMMARY
          echo "- **Grype**: Vulnerability Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **SBOM**: Generated" >> $GITHUB_STEP_SUMMARY
          
          echo "### Attestations" >> $GITHUB_STEP_SUMMARY
          echo "- **Theme Assets**: ✅ Attested" >> $GITHUB_STEP_SUMMARY
          echo "- **Theme Build**: ✅ Attested" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 **All quality checks completed successfully!**" >> $GITHUB_STEP_SUMMARY
