<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iscrizioni Pazienti - SALUTE ORALE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .badge-animate {
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .badge-animate:hover {
            transform: rotate(-5deg) scale(1.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-50 min-h-screen">
    <div class="container mx-auto p-6 max-w-3xl">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">SALUTE ORALE</h1>
            <h2 class="text-xl text-gray-600 mt-1">Iscrizioni Pazienti</h2>
        </header>

        <div class="grid grid-cols-1 gap-4">
            <!-- Paziente 1 -->
            <div class="bg-white rounded-lg p-4 shadow-sm hover:shadow-md transition-shadow">
                <div class="flex items-center gap-4">
                    <div class="badge-animate w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold">L</div>
                    <div class="flex-1">
                        <h3 class="font-semibold text-gray-800">Nome Cognome</h3>
                        <p class="text-gray-600 text-sm">12 Novembre - 15:30</p>
                    </div>
                    <button class="px-3 py-1.5 bg-indigo-100 text-indigo-600 rounded-full text-sm hover:bg-indigo-200 transition">
                        Visualizza
                    </button>
                </div>
            </div>

            <!-- Ripeti struttura per altri pazienti -->
        </div>

        <div class="mt-8 text-center">
            <button class="text-indigo-600 hover:text-indigo-700 font-medium underline underline-offset-4 decoration-dotted">
                Visualizza tutte le richieste
            </button>
        </div>
    </div>
</body>
</html>
