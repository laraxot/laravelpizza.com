<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salute Orale - Cerca un dentista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.6s ease-in-out;
        }
        
        .animate-slide-in {
            animation: slideIn 0.5s ease-out;
        }
        
        .dropdown-arrow {
            transition: transform 0.3s ease;
        }
        
        .dropdown:hover .dropdown-arrow {
            transform: rotate(180deg);
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Header -->
    <header class="bg-blue-900 p-4 flex justify-between items-center">
        <a href="#" class="text-white text-3xl font-light animate-fade-in">
            <span class="font-medium">SALUTE</span> ORA<span class="italic font-light">le</span>
        </a>
        <button class="text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
    </header>

    <!-- Main Content -->
    <main class="p-6">
        <h1 class="text-blue-900 text-3xl font-bold mb-1 animate-slide-in">Cerca un dentista</h1>
        <p class="text-gray-500 text-xl mb-6 animate-slide-in" style="animation-delay: 0.1s">Compila il seguente modulo</p>

        <form action="#" method="GET" class="space-y-4">
            <!-- Regione Dropdown -->
            <div class="relative animate-slide-in" style="animation-delay: 0.2s">
                <select class="w-full p-4 pr-10 rounded-full shadow-md appearance-none bg-white text-xl focus:outline-none focus:ring-2 focus:ring-blue-500 dropdown">
                    <option selected>Lazio</option>
                    <option>Lombardia</option>
                    <option>Piemonte</option>
                    <option>Veneto</option>
                    <option>Toscana</option>
                </select>
                <div class="absolute inset-y-0 right-0 flex items-center pr-6 pointer-events-none">
                    <svg class="w-5 h-5 text-gray-400 dropdown-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </div>
            </div>

            <!-- Città Dropdown -->
            <div class="relative animate-slide-in" style="animation-delay: 0.3s">
                <select class="w-full p-4 pr-10 rounded-full shadow-md appearance-none bg-white text-xl focus:outline-none focus:ring-2 focus:ring-blue-500 dropdown">
                    <option selected>Roma</option>
                    <option>Latina</option>
                    <option>Frosinone</option>
                    <option>Viterbo</option>
                    <option>Rieti</option>
                </select>
                <div class="absolute inset-y-0 right-0 flex items-center pr-6 pointer-events-none">
                    <svg class="w-5 h-5 text-gray-400 dropdown-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </div>
            </div>

            <!-- CAP Dropdown -->
            <div class="relative animate-slide-in" style="animation-delay: 0.4s">
                <select class="w-full p-4 pr-10 rounded-full shadow-md appearance-none bg-white text-xl focus:outline-none focus:ring-2 focus:ring-blue-500 dropdown">
                    <option selected>00042</option>
                    <option>00100</option>
                    <option>00118</option>
                    <option>00121</option>
                    <option>00192</option>
                </select>
                <div class="absolute inset-y-0 right-0 flex items-center pr-6 pointer-events-none">
                    <svg class="w-5 h-5 text-gray-400 dropdown-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </div>
            </div>

            <!-- Search Button -->
            <div class="pt-4 animate-slide-in" style="animation-delay: 0.5s">
                <button type="submit" class="w-full py-4 px-6 rounded-full bg-blue-900 text-white text-xl font-medium uppercase tracking-wider shadow-lg hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all duration-300">
                    Cerca
                </button>
            </div>
        </form>
    </main>

    <!-- SVG Background Animation -->

    <div class="fixed top-0 right-0 w-full z-[-1] opacity-5">

            <path fill="#0055a4" fill-opacity="1" d="M0,288L48,272C96,256,192,224,288,197.3C384,171,480,149,576,165.3C672,181,768,235,864,250.7C960,267,1056,245,1152,229.3C1248,213,1344,203,1392,197.3L1440,192L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z">

                    M0,256L48,245.3C96,235,192,213,288,213.3C384,213,480,235,576,229.3C672,224,768,192,864,181.3C960,171,1056,181,1152,197.3C1248,213,1344,235,1392,245.3L1440,256L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z;
                    
                    M0,288L48,272C96,256,192,224,288,197.3C384,171,480,149,576,165.3C672,181,768,235,864,250.7C960,267,1056,245,1152,229.3C1248,213,1344,203,1392,197.3L1440,192L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"
                />

        </svg>
    </div>
</body>
</html>
