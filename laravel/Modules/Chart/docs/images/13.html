<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salute Orale - Registrazione</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .wave-animation {
            animation: wave 8s ease-in-out infinite alternate;
        }
        
        @keyframes wave {
            0% { d: path('M0,100 C150,120 300,80 500,100 L500,0 L0,0 Z'); }
            100% { d: path('M0,100 C200,80 300,120 500,100 L500,0 L0,0 Z'); }
        }
        
        .pulse-button {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Background SVG Wave -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
        <svg viewBox="0 0 500 150" preserveAspectRatio="none" class="absolute top-0 w-full h-52">
            <path 
                d="M0,100 C150,120 300,80 500,100 L500,0 L0,0 Z" 
                fill="#003b71" 
                class="wave-animation">
            </path>
        </svg>
    </div>

    <!-- Header -->
    <header class="relative z-10 p-4 bg-transparent">
        <div class="container mx-auto">
            <h1 class="text-4xl font-light text-white">
                <span class="font-normal">SALUTE</span> ORA<span class="italic">le</span>
            </h1>
        </div>
        <!-- Mobile Menu Button -->
        <button class="absolute top-6 right-4 text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
    </header>

    <!-- Main Content -->
    <main class="relative z-10 px-4 pt-12 pb-20">
        <div class="container mx-auto max-w-md">
            <h2 class="text-2xl font-bold text-[#003b71] mb-8">Compila il seguente modulo per iscriverti</h2>
            
            <form class="space-y-6">
                <!-- Name Input -->
                <div>
                    <input 
                        type="text" 
                        placeholder="Nome e Cognome" 
                        class="w-full px-6 py-4 rounded-full bg-white shadow-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                </div>
                
                <!-- Upload Certificate Button -->
                <div>
                    <button 
                        type="button" 
                        class="w-full px-6 py-4 rounded-full bg-gray-300 text-[#003b71] font-medium text-lg shadow-md hover:bg-gray-200 transition-colors"
                    >
                        Carica certificazione iscrizione Ordine
                    </button>
                </div>
                
                <!-- Continue Button -->
                <div class="pt-4">
                    <button 
                        type="submit" 
                        class="w-full px-6 py-4 rounded-full bg-[#003b71] text-white font-bold text-xl shadow-md hover:bg-blue-900 transition-colors pulse-button"
                    >
                        CONTINUA
                    </button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
