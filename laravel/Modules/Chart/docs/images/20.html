<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALUTE ORALE - Rifiuto Appuntamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23e5e7eb' fill-opacity='0.2'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            animation: moveBackground 20s linear infinite;
        }
        @keyframes moveBackground {
            0% { background-position: 0 0; }
            100% { background-position: 60px 60px; }
        }
    </style>
</head>
<body class="bg-pattern min-h-screen font-sans">
    <div class="container mx-auto px-4 py-8 max-w-3xl">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">SALUTE ORALE</h1>
            <div class="h-1 w-20 bg-red-500 mt-2"></div>
        </header>

        <section class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold text-gray-700 mb-4">Motivazione del rifiuto appuntamento</h2>
            
            <div class="space-y-4">
                <div class="flex items-start">
                    <input type="checkbox" class="h-5 w-5 text-red-600 rounded mt-1">
                    <div class="ml-3">
                        <span class="font-medium text-gray-800">Conflitto d'agenda</span>
                        <p class="text-gray-600 text-sm">(disponibile in altro orario)</p>
                    </div>
                </div>

                <div class="flex items-start">
                    <input type="checkbox" class="h-5 w-5 text-red-600 rounded mt-1">
                    <div class="ml-3">
                        <span class="font-medium text-gray-800">Chiusura straordinaria</span>
                        <p class="text-gray-600 text-sm">(disponibile in altra data)</p>
                    </div>
                </div>

                <div class="flex items-start">
                    <input type="checkbox" class="h-5 w-5 text-red-600 rounded mt-1">
                    <div class="ml-3">
                        <span class="font-medium text-gray-800">Non fornisce il servizio</span>
                        <p class="text-gray-600 text-sm">(non più disponibile)</p>
                    </div>
                </div>
            </div>

            <div class="mt-8 pt-4 border-t border-gray-200">
                <button class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">
                    Conferma Rifiuto
                </button>
            </div>
        </section>
    </div>
</body>
</html>
