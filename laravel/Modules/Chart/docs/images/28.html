<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selezione Studio - SALUTE ORALE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .studio-card {
            border-left: 4px solid #3B82F6;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .studio-card:hover {
            transform: translateX(8px);
            box-shadow: 4px 4px 12px rgba(59, 130, 246, 0.15);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto p-6 max-w-2xl">
        <div class="space-y-6">
            <!-- Studio 1 -->
            <div class="studio-card bg-white p-5 rounded-lg">
                <h3 class="text-lg font-semibold text-gray-800 mb-1">Studio Odontoiatrico 1</h3>
                <p class="text-gray-600 text-sm">Via Malapelli 9B, 00042 Roma</p>
                <div class="mt-4">
                    <button class="text-blue-600 hover:text-blue-700 font-medium flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2 17.5A2.5 2.5 0 014.5 15h15a2.5 2.5 0 010 5h-15A2.5 2.5 0 012 17.5z"></path>
                        </svg>
                        Visualizza
                    </button>
                </div>
            </div>

            <!-- Altri studi -->
        </div>
    </div>
</body>
</html>
