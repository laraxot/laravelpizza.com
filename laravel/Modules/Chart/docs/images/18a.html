<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALUTE ORALE - Appuntamenti</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23e5e7eb' fill-opacity='0.2'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            animation: moveBackground 20s linear infinite;
        }
        @keyframes moveBackground {
            0% { background-position: 0 0; }
            100% { background-position: 60px 60px; }
        }
    </style>
</head>
<body class="bg-pattern min-h-screen font-sans">
    <div class="container mx-auto px-4 py-8 max-w-3xl">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">SALUTE ORALE</h1>
            <div class="h-1 w-20 bg-blue-500 mt-2"></div>
        </header>

        <section class="mb-12 bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold text-gray-700 mb-4">Appuntamenti accettati</h2>
            
            <div class="space-y-6">
                <!-- Appointment 1 -->
                <div class="border-l-4 border-blue-500 pl-4 py-2">
                    <div class="flex items-center">
                        <input type="checkbox" class="h-5 w-5 text-blue-600 rounded">
                        <span class="ml-3 font-medium text-gray-800">Nome Cognome</span>
                    </div>
                    <p class="ml-8 text-gray-600">12 Novembre - 16:00</p>
                    <button class="ml-8 mt-2 px-4 py-1 bg-blue-100 text-blue-700 rounded-full text-sm font-medium hover:bg-blue-200 transition">
                        Compila il referto
                    </button>
                </div>

                <!-- Appointment 2 -->
                <div class="border-l-4 border-blue-500 pl-4 py-2">
                    <div class="flex items-center">
                        <input type="checkbox" class="h-5 w-5 text-blue-600 rounded">
                        <span class="ml-3 font-medium text-gray-800">Nome Cognome</span>
                    </div>
                    <p class="ml-8 text-gray-600">12 Novembre - 17:00</p>
                    <button class="ml-8 mt-2 px-4 py-1 bg-blue-100 text-blue-700 rounded-full text-sm font-medium hover:bg-blue-200 transition">
                        Compila il referto
                    </button>
                </div>

                <!-- Appointment 3 -->
                <div class="border-l-4 border-blue-500 pl-4 py-2">
                    <div class="flex items-center">
                        <input type="checkbox" class="h-5 w-5 text-blue-600 rounded">
                        <span class="ml-3 font-medium text-gray-800">Nome Cognome</span>
                    </div>
                    <p class="ml-8 text-gray-600">12 Novembre - 18:00</p>
                    <button class="ml-8 mt-2 px-4 py-1 bg-blue-100 text-blue-700 rounded-full text-sm font-medium hover:bg-blue-200 transition">
                        Compila il referto
                    </button>
                </div>
            </div>
        </section>

        <div class="border-t border-gray-200 my-6"></div>

        <section class="mb-6">
            <h2 class="text-xl font-semibold text-gray-700 mb-2">RICHIESTE DI PRENOTAZIONE</h2>
            <p class="text-gray-500 italic">Nessuna richiesta al momento</p>
        </section>

        <section>
            <h2 class="text-xl font-semibold text-gray-700 mb-2">APPUNTAMENTI RIFIUTATI</h2>
            <p class="text-gray-500 italic">Nessun appuntamento rifiutato</p>
        </section>
    </div>
</body>
</html>
