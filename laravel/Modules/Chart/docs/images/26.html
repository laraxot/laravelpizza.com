<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documenti - SALUTE ORALE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .document-card {
            background: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%);
            box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
        }
        .document-card:hover {
            transform: translateY(-2px);
            box-shadow: 6px 6px 16px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto p-6 max-w-2xl">
        <div class="space-y-6">
            <div class="document-card p-6 rounded-xl">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">Documenti di Nome Cognome</h2>
                
                <div class="space-y-4">
                    <button class="w-full p-3 text-left bg-indigo-50 text-indigo-700 rounded-lg hover:bg-indigo-100">
                        Visualizza tessera sanitaria, STP o ENI
                    </button>
                    
                    <button class="w-full p-3 text-left bg-purple-50 text-purple-700 rounded-lg hover:bg-purple-100">
                        Visualizza autocertificazione livello ISEE
                    </button>
                    
                    <button class="w-full p-3 text-left bg-pink-50 text-pink-700 rounded-lg hover:bg-pink-100">
                        Visualizza attestazione di gravidanza
                    </button>
                </div>

                <div class="flex gap-4 mt-6">
                    <button class="flex-1 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
                        ACCETTA
                    </button>
                    <button class="flex-1 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">
                        RIFIUTA
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
