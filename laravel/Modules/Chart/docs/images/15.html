<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salute Orale - Registrazione</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .wave-animation {
      animation: wave 10s linear infinite;
    }
    @keyframes wave {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }
    .float-animation {
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body class="bg-gray-100">
  <!-- SVG Background Animation -->
  <div class="fixed inset-0 z-0 overflow-hidden">
    <svg class="absolute inset-0 w-full h-full" preserveAspectRatio="none" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#003d73" />
          <stop offset="100%" stop-color="#00509e" />
        </linearGradient>
      </defs>
      <rect width="100%" height="100%" fill="url(#blueGradient)" />
      
      <!-- Animated Wave 1 -->
      <path class="wave-animation" fill="rgba(255,255,255,0.05)" d="M0,192L48,197.3C96,203,192,213,288,229.3C384,245,480,267,576,250.7C672,235,768,181,864,181.3C960,181,1056,235,1152,234.7C1248,235,1344,181,1392,154.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z">
      </path>
      
      <!-- Animated Wave 2 -->
      <path class="wave-animation" fill="rgba(255,255,255,0.07)" style="animation-delay: -2s;" d="M0,64L48,80C96,96,192,128,288,133.3C384,139,480,117,576,112C672,107,768,117,864,138.7C960,160,1056,192,1152,197.3C1248,203,1344,181,1392,170.7L1440,160L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z">
      </path>
      
      <!-- Floating Circles -->
      <circle class="float-animation" cx="10%" cy="20%" r="5" fill="rgba(255,255,255,0.2)"></circle>
      <circle class="float-animation" style="animation-delay: -1s;" cx="20%" cy="70%" r="8" fill="rgba(255,255,255,0.15)"></circle>
      <circle class="float-animation" style="animation-delay: -2s;" cx="80%" cy="30%" r="12" fill="rgba(255,255,255,0.1)"></circle>
      <circle class="float-animation" style="animation-delay: -3s;" cx="90%" cy="60%" r="6" fill="rgba(255,255,255,0.2)"></circle>
      <circle class="float-animation" style="animation-delay: -1.5s;" cx="50%" cy="80%" r="9" fill="rgba(255,255,255,0.15)"></circle>
    </svg>
  </div>

  <div class="relative min-h-screen flex flex-col items-center justify-center p-4">
    <!-- Header -->
    <div class="w-full max-w-md mb-8">
      <h1 class="text-4xl text-white font-light">
        <span class="text-white">SALUTE</span> <span class="text-white font-normal">ORA<span class="italic">le</span></span>
      </h1>
    </div>
    
    <!-- Form Container -->
    <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
      <h2 class="text-2xl font-medium text-blue-900 mb-6">
        Compila il seguente modulo per completare l'iscrizione
      </h2>
      
      <form class="space-y-4">
        <div>
          <input 
            type="text" 
            placeholder="Ragione Sociale" 
            class="w-full px-4 py-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
        </div>
        
        <div>
          <input 
            type="text" 
            placeholder="Indirizzo" 
            class="w-full px-4 py-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
        </div>
        
        <div>
          <input 
            type="text" 
            placeholder="Città" 
            class="w-full px-4 py-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
        </div>
        
        <div>
          <input 
            type="text" 
            placeholder="CAP" 
            class="w-full px-4 py-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
        </div>
        
        <div>
          <input 
            type="tel" 
            placeholder="Numero di telefono" 
            class="w-full px-4 py-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
        </div>
        
        <div>
          <input 
            type="email" 
            placeholder="Email" 
            class="w-full px-4 py-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
        </div>
        
        <div>
          <input 
            type="text" 
            placeholder="IBAN" 
            class="w-full px-4 py-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
        </div>
        
        <div class="pt-4">
          <button 
            type="submit" 
            class="w-full bg-blue-900 hover:bg-blue-800 text-white text-lg uppercase font-medium py-3 px-6 rounded-full transition duration-300 ease-in-out transform hover:scale-105"
          >
            CONTINUA
          </button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
