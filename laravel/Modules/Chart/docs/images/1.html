<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smartphone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .phone-shadow {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        
        .phone-reflection {
            position: absolute;
            bottom: -20px;
            left: 0;
            right: 0;
            height: 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), transparent);
            transform: scaleY(-1);
            filter: blur(2px);
        }
    </style>
</head>
<body class="bg-white flex items-center justify-center h-screen">
    <div class="relative">
        <!-- Smartphone frame -->
        <div class="relative w-56 h-96 bg-black rounded-3xl phone-shadow">
            <!-- Screen -->
            <div class="absolute top-12 left-2 right-2 bottom-12 bg-white rounded-sm">
                <!-- Contenuto dello schermo può essere inserito qui -->
            </div>
            
            <!-- Speaker/Top notch -->
            <div class="absolute top-4 left-1/2 transform -translate-x-1/2 w-16 h-1 bg-gray-700 rounded-full"></div>
            
            <!-- Home button -->
            <div class="absolute bottom-3 left-1/2 transform -translate-x-1/2 w-10 h-10 border-2 border-gray-400 rounded-full"></div>
            
            <!-- Side buttons -->
            <div class="absolute top-16 left-0 w-0.5 h-6 bg-gray-400 -ml-0.5 rounded-l-sm"></div>
            <div class="absolute top-28 left-0 w-0.5 h-6 bg-gray-400 -ml-0.5 rounded-l-sm"></div>
            <div class="absolute top-40 left-0 w-0.5 h-6 bg-gray-400 -ml-0.5 rounded-l-sm"></div>
            <div class="absolute top-20 right-0 w-0.5 h-8 bg-gray-400 -mr-0.5 rounded-r-sm"></div>
            
            <!-- Metal frame -->
            <div class="absolute inset-0 border-2 border-gray-300 rounded-3xl pointer-events-none"></div>
        </div>
        
        <!-- Reflection effect -->
        <div class="phone-reflection"></div>
    </div>
    
    <!-- Versione desktop sarebbe simile, potenzialmente con altri dispositivi
         affiancati o una visualizzazione più dettagliata -->
</body>
</html>
