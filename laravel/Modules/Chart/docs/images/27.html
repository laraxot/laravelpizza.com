<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motivazione Rifiuto - SALUTE ORALE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .alert-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 38.5C9.8 38.5 1.5 30.2 1.5 20S9.8 1.5 20 1.5 38.5 9.8 38.5 20 30.2 38.5 20 38.5zm0-1.9c8.9 0 16.2-7.3 16.2-16.2S28.9 4.2 20 4.2 3.8 11.5 3.8 20s7.3 16.2 16.2 16.2z' fill='%23f59e0b' fill-opacity='0.1'/%3E%3C/svg%3E");
            animation: pulseScale 2s ease-in-out infinite;
        }
        @keyframes pulseScale {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto p-6 max-w-2xl">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">SALUTE ORALE</h1>
            <div class="h-1 w-20 bg-red-600 mt-2"></div>
        </header>

        <div class="alert-pattern bg-yellow-50 border-l-4 border-yellow-400 p-6 rounded-lg space-y-6">
            <h2 class="text-xl font-semibold text-yellow-800">Motivazione del rifiuto iscrizione</h2>
            
            <div class="space-y-4">
                <!-- Opzione 1 -->
                <div class="flex items-start group">
                    <div class="flex items-center h-5">
                        <input type="checkbox" class="w-4 h-4 text-yellow-600 border-2 border-yellow-300 rounded-sm focus:ring-yellow-500">
                    </div>
                    <div class="ml-3">
                        <span class="font-medium text-yellow-800 group-hover:text-yellow-900">Dati Personali</span>
                        <p class="text-yellow-700 text-sm mt-1">Sospetta incongruenza o errore di battitura, ricontrollare</p>
                    </div>
                </div>

                <!-- Opzione 2 -->
                <div class="flex items-start group">
                    <div class="flex items-center h-5">
                        <input type="checkbox" class="w-4 h-4 text-yellow-600 border-2 border-yellow-300 rounded-sm focus:ring-yellow-500">
                    </div>
                    <div class="ml-3">
                        <span class="font-medium text-yellow-800 group-hover:text-yellow-900">Tessera Sanitaria, STP o ENI</span>
                        <p class="text-yellow-700 text-sm mt-1">Non leggibile, ricaricare il documento</p>
                    </div>
                </div>

                <!-- Opzione 3 -->
                <div class="flex items-start group">
                    <div class="flex items-center h-5">
                        <input type="checkbox" class="w-4 h-4 text-yellow-600 border-2 border-yellow-300 rounded-sm focus:ring-yellow-500">
                    </div>
                    <div class="ml-3">
                        <span class="font-medium text-yellow-800 group-hover:text-yellow-900">Tessera Sanitaria, STP o ENI</span>
                        <p class="text-yellow-700 text-sm mt-1">Documento errato, caricare quello esatto</p>
                    </div>
                </div>
            </div>

            <div class="border-t border-yellow-200 pt-4">
                <button class="px-6 py-2 bg-yellow-600 text-white rounded-lg hover:bg-yellow-700 transition-transform transform hover:scale-105">
                    INVIA
                </button>
            </div>
        </div>
    </div>
</body>
</html>
