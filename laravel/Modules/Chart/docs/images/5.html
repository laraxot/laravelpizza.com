<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salute Orale - Carica Documenti</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .floating-blob {
            animation: float 8s ease-in-out infinite;
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        
        .pulse-button {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Background SVG animations -->
    <div class="fixed inset-0 z-0 overflow-hidden">
        <svg class="absolute top-0 left-0 w-full h-full opacity-5" viewBox="0 0 100 100" preserveAspectRatio="none">
            <circle class="floating-blob" cx="10" cy="10" r="20" fill="#0047AB" style="animation-delay: 0s;"></circle>
            <circle class="floating-blob" cx="90" cy="30" r="15" fill="#0047AB" style="animation-delay: 1s;"></circle>
            <circle class="floating-blob" cx="50" cy="70" r="25" fill="#0047AB" style="animation-delay: 2s;"></circle>
        </svg>
    </div>

    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="bg-blue-900 text-white p-4 flex justify-between items-center">
            <div class="text-2xl font-light">
                <span class="font-bold">Salute</span> Ora<span class="italic">le</span>
            </div>
            <button class="text-3xl">☰</button>
        </header>

        <!-- Main Content -->
        <main class="flex-1 container mx-auto p-4 max-w-md md:max-w-2xl lg:max-w-4xl">
            <h1 class="text-2xl md:text-3xl text-blue-900 font-bold mb-8">Carica i documenti richiesti</h1>
            
            <div class="space-y-6 md:space-y-8">
                <!-- Form elements -->
                <button class="w-full bg-gray-300 hover:bg-gray-400 text-blue-900 font-bold py-4 px-6 rounded-full transition duration-300 ease-in-out">
                    Carica tessera sanitaria, STP o ENI
                </button>
                
                <button class="w-full bg-gray-300 hover:bg-gray-400 text-blue-900 font-bold py-4 px-6 rounded-full transition duration-300 ease-in-out">
                    Carica autocertificazione livello ISEE
                </button>
                
                <button class="w-full bg-gray-300 hover:bg-gray-400 text-blue-900 font-bold py-4 px-6 rounded-full transition duration-300 ease-in-out">
                    Carica attestazione di gravidanza
                </button>
                
                <div class="mt-10 md:mt-16">
                    <button class="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-4 px-6 rounded-full transition duration-300 ease-in-out pulse-button">
                        CONTINUA
                    </button>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
