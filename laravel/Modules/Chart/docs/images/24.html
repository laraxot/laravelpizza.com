<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALUTE ORALE - Iscrizioni</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto p-6 max-w-4xl">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">SALUTE ORALE</h1>
            <h2 class="text-xl text-gray-600 mt-2">Iscrizioni Pazienti</h2>
        </header>

        <div class="space-y-6">
            <!-- Paziente 1 -->
            <div class="bg-white rounded-xl shadow-md p-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <span class="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center">L</span>
                        <div>
                            <h3 class="font-semibold">Nome Cognome</h3>
                            <p class="text-gray-600">12 Novembre - 15:30</p>
                        </div>
                    </div>
                    <button class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200">
                        Visualizza
                    </button>
                </div>
            </div>

            <!-- Alert Soglia -->
            <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-lg">
                <h3 class="font-semibold text-yellow-800">ATTENZIONE</h3>
                <p class="text-yellow-700">Attualmente le richieste sono 2750. La soglia prevista è di 3000 pazienti.</p>
                <button class="mt-2 px-4 py-2 bg-yellow-100 text-yellow-800 rounded-lg hover:bg-yellow-200">
                    HO COMPRESO
                </button>
            </div>

            <!-- Footer -->
            <button class="w-full py-2 text-center text-blue-600 hover:text-blue-700">
                Visualizza tutte le richieste
            </button>
        </div>
    </div>
</body>
</html>
