name: Viral Marketing Automation

on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      campaign_type:
        description: 'Type of viral campaign'
        required: false
        type: choice
        options:
          - launch
          - update
          - feature-spotlight
          - community-boost
        default: 'launch'

permissions:
  contents: write
  issues: write
  pull-requests: write
  discussions: write

jobs:
  viral-blast:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        platform: [github, twitter, reddit, dev-to]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract module info
        id: module-info
        run: |
          MODULE_NAME=$(basename $(pwd))
          echo "module-name=$MODULE_NAME" >> $GITHUB_OUTPUT
          
          if [ -f "composer.json" ]; then
            VERSION=$(grep '"version"' composer.json | sed 's/.*"version": "\(.*\)".*/\1/' || echo "1.0.0")
          elif [ -f "VERSION" ]; then
            VERSION=$(cat VERSION)
          else
            VERSION="1.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          if [ -f "README.md" ]; then
            DESC=$(head -5 README.md | grep -v "^#" | tail -1 | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | head -c 200)
          else
            DESC="Amazing Laravel module for $MODULE_NAME"
          fi
          echo "description=$DESC" >> $GITHUB_OUTPUT

      - name: Generate viral content
        id: generate-content
        run: |
          MODULE_NAME="${{ steps.module-info.outputs.module-name }}"
          VERSION="${{ steps.module-info.outputs.version }}"
          DESCRIPTION="${{ steps.module-info.outputs.description }}"
          PLATFORM="${{ matrix.platform }}"
          
          case $PLATFORM in
            "github")
              CONTENT="🚀 **${MODULE_NAME} v${VERSION} is LIVE!** 🎯
              
${DESCRIPTION}

⭐ Supercharge your Laravel apps today!

🔗 Grab it now: https://github.com/${{ github.repository }}

# Laravel #OSS #DevTools"
              ;;
            "twitter")
              CONTENT="🚀 Just dropped ${MODULE_NAME} v${VERSION}! ${DESCRIPTION}

⚡ Supercharge your Laravel apps with this amazing module! 🔥

#Laravel #PHP #OpenSource #WebDev"
              ;;
            "reddit")
              CONTENT="## 🎯 New Release: ${MODULE_NAME} v${VERSION}

I just released version ${VERSION} of ${MODULE_NAME}! 

### What is it?
${DESCRIPTION}

### Get it now:
- GitHub: https://github.com/${{ github.repository }}
- Packagist: https://packagist.org/packages/ptvx/${MODULE_NAME,,}

#Laravel #PHP #OpenSource"
              ;;
          esac
          
          echo "$CONTENT" > viral-content-${PLATFORM}.md
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post to GitHub Discussion
        if: matrix.platform == 'github'
        uses: peter-evans/create-discussion@v3
        with:
          title: "🚀 ${{ steps.module-info.outputs.module-name }} v${{ steps.module-info.outputs.version }} Released!"
          body: ${{ steps.generate-content.outputs.content }}
          repository: ${{ github.repository }}
          category: announcements

      - name: Create trending GitHub issue
        if: matrix.platform == 'github'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚀 ${{ steps.module-info.outputs.module-name }} v${{ steps.module-info.outputs.version }} - Feature Showcase!',
              body: ${{ steps.generate-content.outputs.content }},
              labels: ['announcement', 'release', '${{ steps.module-info.outputs.module-name }}']
            })

      - name: Update README with viral elements
        run: |
          if [ -f "README.md" ]; then
            cat >> README.md << 'EOF'

---

## 🌟 Star History

[![Star History Chart](https://api.star-history.com/svg?repos=${{ github.repository }}&type=Date)](https://star-history.com/#${{ github.repository }}&Date)

## 🤝 Support Our Work

If you find this module helpful, please consider:
- ⭐ Giving us a star on GitHub
- 💖 Sponsoring our work
- 🐛 Reporting issues and suggesting features

EOF
          fi

      - name: Commit viral improvements
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md 2>/dev/null || true
          git commit -m "🚀 Add viral marketing elements [skip ci]" || true
          git push

