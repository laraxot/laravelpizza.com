            .xot-core { opacity: 0.98; }
            .xot-modules { opacity: 0.9; }
            .xot-connections { opacity: 0.85; }
            .xot-framework { opacity: 0.8; }
        }
        
        @media (prefers-reduced-motion: reduce) {
            .xot-core, .xot-modules, .xot-connections, .xot-framework { animation: none; }
        }
