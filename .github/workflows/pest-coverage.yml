name: Pest Coverage

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

env:
  php-version: '8.3'
  coverage-minimum: 80

jobs:
  pest-coverage:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: laravelpizza_data_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP with PCOV
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.php-version }}
          extensions: mbstring, intl, pdo_mysql, pcov
          coverage: pcov
          tools: composer:v2

      - name: Create test databases
        run: |
          mysql -h 127.0.0.1 -u root -ppassword -e "CREATE DATABASE IF NOT EXISTS laravelpizza_data_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
          mysql -h 127.0.0.1 -u root -ppassword -e "CREATE DATABASE IF NOT EXISTS laravelpizza_user_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"

      - name: Get Composer Cache Directory
        id: composer-cache
        working-directory: laravel
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Add Flux Credentials
        if: env.FLUX_USERNAME != ''
        working-directory: laravel
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"
        env:
          FLUX_USERNAME: ${{ secrets.FLUX_USERNAME }}

      - name: Install Dependencies
        working-directory: laravel
        run: composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: Setup Environment
        working-directory: laravel
        run: |
          cp .env.testing .env
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=password/' .env
          sed -i 's/^DB_USERNAME_USER=.*/DB_USERNAME_USER=root/' .env
          sed -i 's/^DB_PASSWORD_USER=.*/DB_PASSWORD_USER=password/' .env
          php artisan key:generate --force

      - name: Run Migrations (NEVER migrate:fresh)
        working-directory: laravel
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravelpizza_data_test
          DB_USERNAME: root
          DB_PASSWORD: password
          DB_DATABASE_USER: laravelpizza_user_test
          DB_USERNAME_USER: root
          DB_PASSWORD_USER: password
        run: php artisan migrate --env=testing --force

      - name: Run Pest Tests with Coverage
        id: pest-coverage
        working-directory: laravel
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravelpizza_data_test
          DB_USERNAME: root
          DB_PASSWORD: password
          DB_DATABASE_USER: laravelpizza_user_test
          DB_USERNAME_USER: root
          DB_PASSWORD_USER: password
        run: |
          ./vendor/bin/pest \
            --compact \
            --coverage \
            --coverage-clover=coverage.xml \
            --coverage-html=coverage-html \
            --colors=never \
            2>&1 | tee coverage-output.txt
          exit ${PIPESTATUS[0]}

      - name: Extract Coverage Percentage
        id: extract-coverage
        if: always()
        run: |
          COVERAGE=$(grep -oP '\d+\.?\d*(?=\s*%)' laravel/coverage-output.txt | tail -1 || echo "0")
          if [ -z "$COVERAGE" ]; then COVERAGE="0"; fi
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Coverage: $COVERAGE%"

      - name: Determine Badge Color
        id: badge-color
        if: always()
        run: |
          COVERAGE=${{ steps.extract-coverage.outputs.coverage }}
          COLOR="red"
          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            COLOR="yellow"
          elif (( $(echo "$COVERAGE >= 40" | bc -l) )); then
            COLOR="orange"
          fi
          echo "color=$COLOR" >> $GITHUB_OUTPUT
          echo "Badge color: $COLOR"

      - name: Generate Coverage Badge
        if: always()
        run: |
          COVERAGE="${{ steps.extract-coverage.outputs.coverage }}"
          COLOR="${{ steps.badge-color.outputs.color }}"
          curl -s "https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR}" > coverage-badge.svg
          echo "Generated badge for ${COVERAGE}% coverage"

      - name: Commit Coverage Badge
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if git diff --quiet coverage-badge.svg 2>/dev/null; then
            echo "Badge unchanged, skipping commit"
            exit 0
          fi
          git add coverage-badge.svg
          git commit -m "chore: update coverage badge ${{ steps.extract-coverage.outputs.coverage }}%" || echo "No changes to commit"
          git push || echo "Nothing to push"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            laravel/coverage.xml
            laravel/coverage-html/
          retention-days: 30

      - name: Comment Coverage on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const coverage = '${{ steps.extract-coverage.outputs.coverage }}';
            const color = '${{ steps.badge-color.outputs.color }}';
            const minimum = '${{ env.coverage-minimum }}';

            const pass = parseFloat(coverage) >= parseFloat(minimum);
            const status = pass ? '✅ PASS' : '❌ FAIL';
            const body = `## Pest Test Coverage Report

            ${status} - **${coverage}%** (minimum: ${minimum}%)

            ![Coverage](https://img.shields.io/badge/coverage-${coverage}%25-${color})

            <details>
            <summary>Coverage Details</summary>

            - **Coverage**: ${coverage}%
            - **Minimum Required**: ${minimum}%
            - **Status**: ${status}

            </details>

            ---
            *Generated by [Pest Coverage Action](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if Coverage Below Minimum
        if: steps.pest-coverage.outcome == 'failure'
        run: |
          echo "Coverage ${{ steps.extract-coverage.outputs.coverage }}% is below minimum ${{ env.coverage-minimum }}%"
          exit 1
