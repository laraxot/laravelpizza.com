name: Pest Coverage

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

env:
  php-version: '8.3'
  coverage-minimum: 80

jobs:
  pest-coverage:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.php-version }}
          extensions: mbstring, intl, pdo_mysql, pcov
          coverage: pcov
          tools: composer:v2

      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          cd laravel
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Dependencies
        run: |
          cd laravel
          composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: Run Pest Tests with Coverage
        id: pest-coverage
        run: |
          cd laravel
          ./vendor/bin/pest --coverage --coverage-xml=coverage.xml --coverage-html=coverage-html --min=${{ env.coverage-minimum }} --colors=never 2>&1 | tee coverage-output.txt
          
          # Extract coverage percentage
          COVERAGE=$(grep -oP '\d+\.?\d*(?=%)' coverage-output.txt | head -1 || echo "0")
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Coverage: $COVERAGE%"

      - name: Determine Badge Color
        id: badge-color
        run: |
          COVERAGE=${{ steps.pest-coverage.outputs.coverage }}
          COLOR="red"
          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            COLOR="yellow"
          elif (( $(echo "$COVERAGE >= 40" | bc -l) )); then
            COLOR="orange"
          fi
          echo "color=$COLOR" >> $GITHUB_OUTPUT
          echo "Badge color: $COLOR"

      - name: Generate Coverage Badge
        run: |
          COVERAGE="${{ steps.pest-coverage.outputs.coverage }}"
          COLOR="${{ steps.badge-color.outputs.color }}"
          
          # Download badge from shields.io
          curl -s "https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR}" > coverage-badge.svg
          
          echo "Generated badge for ${COVERAGE}% coverage"

      - name: Commit Coverage Badge
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Check if badge has changed
          if git diff --quiet coverage-badge.svg 2>/dev/null; then
            echo "Badge unchanged, skipping commit"
            exit 0
          fi
          
          git add coverage-badge.svg
          git commit -m "Update coverage badge: ${{ steps.pest-coverage.outputs.coverage }}%" || echo "No changes to commit"
          git push || echo "Nothing to push"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            laravel/coverage.xml
            laravel/coverage-html/
          retention-days: 30

      - name: Comment Coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const coverage = '${{ steps.pest-coverage.outputs.coverage }}';
            const color = '${{ steps.badge-color.outputs.color }}';
            const minimum = '${{ env.coverage-minimum }}';
            
            const status = parseFloat(coverage) >= parseFloat(minimum) ? '✅ PASS' : '❌ FAIL';
            const body = `## 🧪 Pest Test Coverage Report
            
            ${status} - **${coverage}%** (minimum: ${minimum}%)
            
            ![Coverage](https://img.shields.io/badge/coverage-${coverage}%25-${color})
            
            <details>
            <summary>📊 Coverage Details</summary>
            
            - **Coverage**: ${coverage}%
            - **Minimum Required**: ${minimum}%
            - **Status**: ${status}
            - **Color**: ${color}
            
            </details>
            
            ---
            *Generated by [Pest Coverage Action](https://github.com/laraxot/laravelpizza.com/actions/runs/${{ github.run_id }})*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if Coverage Too Low
        if: ${{ steps.pest-coverage.outputs.coverage < env.coverage-minimum }}
        run: |
          echo "❌ Coverage ${{ steps.pest-coverage.outputs.coverage }}% is below minimum ${{ env.coverage-minimum }}%"
          exit 1
