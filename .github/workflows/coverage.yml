name: Pest Test Coverage

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

jobs:
  pest-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: laravelpizza_data_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP with PCOV
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql, pcov
          coverage: pcov
          tools: composer:v2

      - name: Create test databases
        run: |
          mysql -h 127.0.0.1 -u root -ppassword -e "CREATE DATABASE IF NOT EXISTS laravelpizza_data_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
          mysql -h 127.0.0.1 -u root -ppassword -e "CREATE DATABASE IF NOT EXISTS laravelpizza_user_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: laravel/vendor
          key: composer-${{ hashFiles('laravel/composer.lock') }}
          restore-keys: composer-

      - name: Add Flux Credentials
        if: env.FLUX_USERNAME != ''
        working-directory: laravel
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"
        env:
          FLUX_USERNAME: ${{ secrets.FLUX_USERNAME }}

      - name: Install Dependencies
        working-directory: laravel
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Setup Environment
        working-directory: laravel
        run: |
          cp .env.testing .env
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=password/' .env
          sed -i 's/^DB_USERNAME_USER=.*/DB_USERNAME_USER=root/' .env
          sed -i 's/^DB_PASSWORD_USER=.*/DB_PASSWORD_USER=password/' .env
          php artisan key:generate --force

      - name: Run Migrations (NEVER migrate:fresh)
        working-directory: laravel
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravelpizza_data_test
          DB_USERNAME: root
          DB_PASSWORD: password
          DB_DATABASE_USER: laravelpizza_user_test
          DB_USERNAME_USER: root
          DB_PASSWORD_USER: password
        run: php artisan migrate --env=testing --force

      - name: Run Pest Tests with Coverage
        id: pest-coverage
        working-directory: laravel
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravelpizza_data_test
          DB_USERNAME: root
          DB_PASSWORD: password
          DB_DATABASE_USER: laravelpizza_user_test
          DB_USERNAME_USER: root
          DB_PASSWORD_USER: password
          ACTIVITY_LOGGER_DB_CONNECTION: mysql
        run: |
          ./vendor/bin/pest \
            --compact \
            --coverage \
            --coverage-clover=coverage.xml

      - name: Generate test coverage badge
        if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'
        uses: timkrase/phpunit-coverage-badge@v1.2.0
        with:
          coverage_badge_path: 'coverage-badge.svg'
          push_badge: false
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          report: laravel/coverage.xml
