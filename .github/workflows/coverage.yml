name: Pest Test Coverage

on:
  push:
    branches:
      - main
      - master
      - dev
      - develop

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        operating-system: [ubuntu-latest]
        php-versions: ['8.3']

    name: P${{ matrix.php-versions }} - ${{ matrix.operating-system}}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: laravelpizza_data_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Install PHP versions with PCOV
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: mbstring, intl, pdo_mysql, pcov
          coverage: pcov

      - name: Create test databases
        run: |
          mysql -h 127.0.0.1 -u root -ppassword -e "CREATE DATABASE IF NOT EXISTS laravelpizza_data_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
          mysql -h 127.0.0.1 -u root -ppassword -e "CREATE DATABASE IF NOT EXISTS laravelpizza_user_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"

      - name: Install Dependencies
        working-directory: ./laravel
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Setup Environment
        working-directory: ./laravel
        run: |
          cp .env.testing .env
          php artisan key:generate --force

      - name: Run Migrations (NEVER migrate:fresh)
        working-directory: ./laravel
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravelpizza_data_test
          DB_USERNAME: root
          DB_PASSWORD: password
          DB_DATABASE_USER: laravelpizza_user_test
          DB_USERNAME_USER: root
          DB_PASSWORD_USER: password
        run: php artisan migrate --env=testing --force

      - name: Execute tests and generate coverage via PestPHP
        working-directory: ./laravel
        env:
          SESSION_DRIVER: array
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravelpizza_data_test
          DB_USERNAME: root
          DB_PASSWORD: password
          DB_DATABASE_USER: laravelpizza_user_test
          DB_USERNAME_USER: root
          DB_PASSWORD_USER: password
        run: ./vendor/bin/pest --coverage --coverage-clover coverage.xml

      - name: Generate test coverage badge
        uses: timkrase/phpunit-coverage-badge@v1.2.0
        with:
          coverage_badge_path: 'badge-coverage.svg'
          push_badge: true
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          report: laravel/coverage.xml
