name: CI - Code Quality & Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  phpstan:
    name: PHPStan Level 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, pdo, pdo_mysql, sqlite3
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: laravel/vendor
          key: composer-${{ hashFiles('laravel/composer.lock') }}
          restore-keys: composer-

      - name: Add Flux Credentials
        if: env.FLUX_USERNAME != ''
        working-directory: laravel
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"
        env:
          FLUX_USERNAME: ${{ secrets.FLUX_USERNAME }}

      - name: Install Dependencies
        working-directory: laravel
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Run PHPStan
        working-directory: laravel
        run: ./vendor/bin/phpstan analyse Modules --level=10 --memory-limit=1G --no-progress

  pint:
    name: Laravel Pint (PSR-12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: laravel/vendor
          key: composer-${{ hashFiles('laravel/composer.lock') }}
          restore-keys: composer-

      - name: Add Flux Credentials
        if: env.FLUX_USERNAME != ''
        working-directory: laravel
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"
        env:
          FLUX_USERNAME: ${{ secrets.FLUX_USERNAME }}

      - name: Install Dependencies
        working-directory: laravel
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Run Pint (check mode)
        working-directory: laravel
        run: ./vendor/bin/pint --test

  theme-build:
    name: Theme Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml
          coverage: none

      - name: Add Flux Credentials
        if: env.FLUX_USERNAME != ''
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"
        env:
          FLUX_USERNAME: ${{ secrets.FLUX_USERNAME }}

      - name: Install PHP Dependencies (required for vendor CSS)
        working-directory: laravel
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: laravel/Themes/Meetup/package-lock.json

      - name: Install & Build Theme
        working-directory: laravel/Themes/Meetup
        run: |
          npm ci
          npm run build
