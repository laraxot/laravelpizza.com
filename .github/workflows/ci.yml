name: CI - Code Quality & Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  phpstan:
    name: PHPStan Level 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, pdo, pdo_mysql, sqlite3
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: laravel/vendor
          key: composer-${{ hashFiles('laravel/composer.lock') }}
          restore-keys: composer-

      - name: Add Flux Credentials
        if: env.FLUX_USERNAME != ''
        working-directory: laravel
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"
        env:
          FLUX_USERNAME: ${{ secrets.FLUX_USERNAME }}

      - name: Install Dependencies
        working-directory: laravel
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Run PHPStan
        working-directory: laravel
        run: ./vendor/bin/phpstan analyse Modules --level=10 --memory-limit=1G --no-progress

  pint:
    name: Laravel Pint (PSR-12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: laravel/vendor
          key: composer-${{ hashFiles('laravel/composer.lock') }}
          restore-keys: composer-

      - name: Add Flux Credentials
        if: env.FLUX_USERNAME != ''
        working-directory: laravel
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"
        env:
          FLUX_USERNAME: ${{ secrets.FLUX_USERNAME }}

      - name: Install Dependencies
        working-directory: laravel
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Run Pint (check mode)
        working-directory: laravel
        run: ./vendor/bin/pint --test

  tests:
    name: Tests (Pest)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: laravelpizza_data_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP with PCOV
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, pdo, pdo_mysql, pcov
          coverage: pcov

      - name: Create test databases
        run: |
          mysql -h 127.0.0.1 -u root -ppassword -e "CREATE DATABASE IF NOT EXISTS laravelpizza_data_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
          mysql -h 127.0.0.1 -u root -ppassword -e "CREATE DATABASE IF NOT EXISTS laravelpizza_user_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: laravel/vendor
          key: composer-${{ hashFiles('laravel/composer.lock') }}
          restore-keys: composer-

      - name: Add Flux Credentials
        if: env.FLUX_USERNAME != ''
        working-directory: laravel
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"
        env:
          FLUX_USERNAME: ${{ secrets.FLUX_USERNAME }}

      - name: Install Dependencies
        working-directory: laravel
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Setup Environment
        working-directory: laravel
        run: |
          cp .env.testing .env
          php artisan key:generate --force

      - name: Run Migrations (NEVER migrate:fresh)
        working-directory: laravel
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravelpizza_data_test
          DB_USERNAME: root
          DB_PASSWORD: password
          DB_DATABASE_USER: laravelpizza_user_test
          DB_USERNAME_USER: root
          DB_PASSWORD_USER: password
        run: php artisan migrate --env=testing --force

      - name: Run Pest Tests
        working-directory: laravel
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravelpizza_data_test
          DB_USERNAME: root
          DB_PASSWORD: password
          DB_DATABASE_USER: laravelpizza_user_test
          DB_USERNAME_USER: root
          DB_PASSWORD_USER: password
        run: ./vendor/bin/pest --compact

  theme-build:
    name: Theme Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml
          coverage: none

      - name: Add Flux Credentials
        if: env.FLUX_USERNAME != ''
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"
        env:
          FLUX_USERNAME: ${{ secrets.FLUX_USERNAME }}

      - name: Install PHP Dependencies (required for vendor CSS)
        working-directory: laravel
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: laravel/Themes/Meetup/package-lock.json

      - name: Install & Build Theme
        working-directory: laravel/Themes/Meetup
        run: |
          npm ci
          npm run build
