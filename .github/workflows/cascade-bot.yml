name: Cascade AI Bot - Discussion Comments

on:
  workflow_dispatch:
    inputs:
      discussion_id:
        description: 'Discussion ID to comment on (e.g., 188)'
        required: true
        type: string
      comment_body:
        description: 'Comment content (Markdown supported)'
        required: true
        type: string
      comment_title:
        description: 'Optional title/header for the comment'
        required: false
        type: string
        default: '🌊 Cascade AI Assistant'

permissions:
  discussions: write
  contents: read

jobs:
  post-comment:
    runs-on: ubuntu-latest
    steps:
      - name: Post comment to discussion
        uses: wesleyscholl/create-discussion-comment@v1.0.18
        with:
          discussion-id: ${{ github.event.inputs.discussion_id }}
          body: |
            ${{ github.event.inputs.comment_title }}

            ${{ github.event.inputs.comment_body }}

            ---
            🤖 Automated response | [LaravelPizza Project](https://github.com/laraxot/laravelpizza.com) | Powered by AI
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log success
        run: |
          echo "✅ Comment posted to discussion #${{ github.event.inputs.discussion_id }}"
          echo "Comment preview: ${{ github.event.inputs.comment_title }}"
